# ==========================================
# END-TO-END HYBRID ASR CONFIGURATION (Raw Audio -> WavLM -> Decoder)
# ==========================================

# --- 1. EXPERIMENT INFO ---
experiment:
  project_name : "wavlm-ctc-asr-v1"
  seed         : 42              
  output_dir   : "./logs/experiments"

# --- 2. DATA PIPELINE (Raw Audio + Manifest) ---
data:
  train_manifest  : "data/processed/train_manifest.jsonl"
  val_manifest    : "data/processed/val_manifest.jsonl"
  noise_dir       : "data/raw/noise"
  
  sample_rate     : 16000
  batch_size      : 32
  num_workers     : 8 
  max_duration    : 15.0

# --- 3. MODEL ARCHITECTURE (The Hybrid Core) ---
model:
  # The "Ears" (Acoustic Feature Extractor)
  backbone        : "microsoft/wavlm-base-plus"       # Ringan, cocok untuk eksperimen awal
  # backbone      : "microsoft/wavlm-large"           # Akurasi tinggi, butuh VRAM besar
  # backbone      : "facebook/wav2vec2-large-xlsr-53" # Sangat bagus untuk fonem IPA
  # backbone      : "facebook/hubert-large-ls960-ft"  # Sangat stabil
  freeze_feature_extractor : True    # Set True di awal jika GPU Colab sering OOM
  
  # SpecAugment configuration 
  mask_time_prob           : 0.05
  mask_time_length         : 10
  mask_feature_prob        : 0.05
  mask_feature_length      : 10

  dropout                  : 0.1

# --- 4. TRAINING HYPERPARAMETERS ---
train:
  epochs           : 20
  learning_rate    : 1e-4     
  optimizer        : "adamw"  
  weight_decay     : 0.005    
  
  # Real Batch Size = batch_size (8) * accum_steps (4) = 32
  gradient_accumulation_steps: 4
  
  fp16             : True
  device           : "cuda"
  logging_steps    : 100     
  save_total_limit : 2